<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#15102b" />
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <title>Brawl Draft Coach — Ranked Pick & Ban Helper</title>
  <meta name="description" content="Draft assistant for Brawl Stars Ranked. Best picks, bans, counters and first/last-pick strategy by map — auto-updating roster." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://cdn.brawlify.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">🎯</span>
        <div>
          <h1>Brawl Draft Coach</h1>
          <p class="tagline">Pick smart. Climb to Pro.</p>
        </div>
      </div>
      <div class="topbar-right">
        <span id="data-status" class="data-status" title="Where the roster data came from">…</span>
      </div>
    </header>

    <!-- shared mode + map controls -->
    <section class="controls" id="controls" hidden>
      <div class="control-block">
        <label class="control-label">Mode</label>
        <div class="mode-pills" id="mode-pills"></div>
      </div>
      <div class="control-block grow">
        <label class="control-label" for="map-select">Map</label>
        <div class="map-row">
          <img id="map-thumb" class="map-thumb" alt="" />
          <select id="map-select" class="map-select"></select>
        </div>
      </div>
    </section>

    <nav class="tabs" id="tabs" hidden>
      <button class="tab active" data-tab="assistant">⚔️ Draft Assistant</button>
      <button class="tab" data-tab="cheatsheet">📋 Cheat-Sheet</button>
    </nav>

    <main id="main" hidden>
      <section id="tab-assistant" class="tab-panel active"></section>
      <section id="tab-cheatsheet" class="tab-panel"></section>
    </main>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <p>Loading live roster &amp; meta…</p>
    </div>

    <footer class="footer">
      <p>
        Roster &amp; maps: <a href="https://brawlify.com" target="_blank" rel="noopener">Brawlify API</a> (auto-updates).
        Tier ratings are community-seeded &amp; editable — see the README.
        Not affiliated with Supercell.
      </p>
    </footer>
  </div>

  <!-- brawler picker modal -->
  <div id="picker" class="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="picker-title">Choose a brawler</h3>
        <button id="picker-close" class="icon-btn" aria-label="Close">✕</button>
      </div>
      <input id="picker-search" class="picker-search" type="text" placeholder="Search brawlers…" autocomplete="off" />
      <div id="picker-grid" class="picker-grid"></div>
    </div>
  </div>

  <!-- Safety net: runs even when ES modules are blocked (e.g. opened via file://) -->
  <script>
    if (location.protocol === "file:") {
      document.addEventListener("DOMContentLoaded", function () {
        var l = document.getElementById("loading");
        if (l) l.innerHTML = '<p style="max-width:540px;text-align:center;line-height:1.6">' +
          "⚠️ Please open this through a web server, not by double-clicking the file.<br><br>" +
          "Browsers block local data (and JavaScript modules) over <code>file://</code>.<br><br>" +
          "Run <code>python -m http.server</code> in this folder and open <code>http://localhost:8000</code> — " +
          "or just deploy it to GitHub Pages, where it works automatically.</p>";
      });
    }
  </script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>

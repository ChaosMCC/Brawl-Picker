name: Update meta data

# Keeps the bundled roster snapshot fresh and best-effort refreshes tier ratings
# from live win-rates. Runs weekly + on demand. Commits straight to the branch,
# which auto-redeploys GitHub Pages.

on:
  schedule:
    - cron: "17 6 * * 1"   # every Monday 06:17 UTC
  workflow_dispatch: {}      # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh roster + map snapshot
        run: node scripts/build-data.mjs

      - name: Best-effort refresh tier ratings from live win-rates
        run: node scripts/refresh-tiers.mjs

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "chore: auto-refresh meta data ($(date -u +%Y-%m-%d))"
            git push
            echo "Pushed updated meta data."
          else
            echo "No changes — meta data already up to date."
          fi
